<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <!-- Soft background wash -->
  <rect width="400" height="200" fill="#f0fdf4" opacity="0.8"/>

  <!-- Large speech bubble back -->
  <rect x="180" y="20" width="160" height="90" rx="18" fill="#bbf7d0" opacity="0.8"/>
  <polygon points="200,110 215,110 195,135" fill="#bbf7d0" opacity="0.8"/>
  <!-- Lines inside -->
  <rect x="200" y="40" width="100" height="6" rx="3" fill="#86efac" opacity="0.85"/>
  <rect x="200" y="55" width="75" height="6" rx="3" fill="#86efac" opacity="0.75"/>
  <rect x="200" y="70" width="90" height="6" rx="3" fill="#86efac" opacity="0.7"/>

  <!-- Small speech bubble front -->
  <rect x="30" y="60" width="120" height="70" rx="16" fill="#dcfce7" opacity="0.85"/>
  <polygon points="125,130 110,130 135,155" fill="#dcfce7" opacity="0.85"/>
  <!-- Lines inside -->
  <rect x="50" y="80" width="70" height="5" rx="3" fill="#86efac" opacity="0.8"/>
  <rect x="50" y="92" width="50" height="5" rx="3" fill="#86efac" opacity="0.7"/>

  <!-- Decorative dots -->
  <circle cx="360" cy="160" r="12" fill="#bbf7d0" opacity="0.6"/>
  <circle cx="340" cy="175" r="7" fill="#86efac" opacity="0.5"/>
  <circle cx="20" cy="30" r="8" fill="#bbf7d0" opacity="0.6"/>
  <circle cx="60" cy="25" r="5" fill="#dcfce7" opacity="0.65"/>

  <!-- Question marks -->
  <text x="290" y="160" font-family="serif" font-size="36" fill="#86efac" opacity="0.5" transform="rotate(-15 290 160)">?</text>
  <text x="155" y="45" font-family="serif" font-size="28" fill="#86efac" opacity="0.45" transform="rotate(10 155 45)">?</text>
</svg>
